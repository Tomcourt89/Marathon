<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryo Archive — Vault Guide</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div id="countdown-banner" class="countdown-banner" aria-live="polite" aria-atomic="true"></div>
    <h1>Cryo Archive</h1>
    <p class="subtitle">Vault Guide</p>
  </header>
  <main>
    <div id="card-grid" class="card-grid"></div>
  </main>
  <dialog id="vault-modal" class="vault-modal" aria-labelledby="modal-title">
    <div class="modal-content"></div>
  </dialog>
  <dialog id="lightbox-dialog" class="lightbox-dialog" aria-label="Fullscreen image">
    <button class="lightbox-close" type="button" aria-label="Close fullscreen image" autofocus>&times;</button>
    <img class="lightbox-img" src="" alt="">
  </dialog>
  <div id="disclaimer-tooltip" class="disclaimer-tooltip" role="tooltip" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
